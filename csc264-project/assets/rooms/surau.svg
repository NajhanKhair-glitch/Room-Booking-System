<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 248" role="img" aria-label="Surau prayer hall">
  <defs>
    <linearGradient id="surBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0ECFB"/><stop offset="1" stop-color="#E2D8F6"/>
    </linearGradient>
    <g id="mat">
      <path d="M0 18 a11 11 0 0 1 22 0 v22 a3 3 0 0 1 -3 3 h-16 a3 3 0 0 1 -3 -3 z" />
    </g>
  </defs>
  <rect width="440" height="248" fill="url(#surBg)"/>
  <!-- hall body -->
  <rect x="60" y="92" width="320" height="118" rx="10" fill="#EDE6FA" stroke="#CFC1EE" stroke-width="2"/>
  <!-- minarets -->
  <rect x="64" y="60" width="20" height="150" rx="6" fill="#9A7BD6"/>
  <rect x="356" y="60" width="20" height="150" rx="6" fill="#9A7BD6"/>
  <circle cx="74" cy="56" r="9" fill="#8A68CE"/><circle cx="366" cy="56" r="9" fill="#8A68CE"/>
  <!-- dome + finial -->
  <path d="M150 92 a70 56 0 0 1 140 0 z" fill="#8A68CE"/>
  <rect x="216" y="22" width="8" height="20" rx="3" fill="#7C5BD0"/>
  <circle cx="220" cy="20" r="6" fill="#7C5BD0"/>
  <!-- mihrab arch -->
  <path d="M196 210 v-48 a24 24 0 0 1 48 0 v48 z" fill="#7C5BD0"/>
  <!-- prayer mats -->
  <g fill="#9A7BD6">
    <use href="#mat" x="92"  y="150"/><use href="#mat" x="124" y="150"/>
    <use href="#mat" x="288" y="150"/><use href="#mat" x="320" y="150"/>
  </g>
  <g fill="#7FB89B">
    <use href="#mat" x="92"  y="172"/><use href="#mat" x="124" y="172"/>
    <use href="#mat" x="288" y="172"/><use href="#mat" x="320" y="172"/>
  </g>
</svg>
