<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 248" role="img" aria-label="Networking lab">
  <defs>
    <linearGradient id="netBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E7EEFB"/><stop offset="1" stop-color="#D5E2F8"/>
    </linearGradient>
    <g id="netPc">
      <rect x="2" y="2" width="46" height="30" rx="5" fill="#B9CEEF"/>
      <rect x="7" y="7" width="36" height="20" rx="3" fill="#6E8BD8"/>
      <rect x="11" y="11" width="18" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.85"/>
      <rect x="19" y="32" width="12" height="6" rx="2" fill="#7E93B5"/>
      <rect x="13" y="38" width="24" height="4" rx="2" fill="#9AAAC6"/>
    </g>
  </defs>
  <rect width="440" height="248" fill="url(#netBg)"/>
  <!-- whiteboard -->
  <rect x="120" y="22" width="170" height="42" rx="9" fill="#FFFFFF" stroke="#C6D5ED" stroke-width="2"/>
  <rect x="134" y="36" width="110" height="6" rx="3" fill="#DCE6F5"/>
  <rect x="134" y="48" width="130" height="5" rx="2.5" fill="#E8EEF8"/>
  <!-- network node graph (top-left) -->
  <g stroke="#5F6BD8" stroke-width="2.5" fill="#5F6BD8">
    <line x1="42" y1="34" x2="74" y2="20"/><line x1="42" y1="34" x2="78" y2="52"/><line x1="74" y1="20" x2="78" y2="52"/>
    <circle cx="42" cy="34" r="7"/><circle cx="74" cy="20" r="7"/><circle cx="78" cy="52" r="7"/>
  </g>
  <!-- server rack (right) -->
  <rect x="356" y="20" width="58" height="92" rx="8" fill="#3F4A66"/>
  <g>
    <rect x="364" y="28" width="42" height="16" rx="3" fill="#586590"/><circle cx="399" cy="36" r="3" fill="#5FE0A6"/>
    <rect x="364" y="48" width="42" height="16" rx="3" fill="#586590"/><circle cx="399" cy="56" r="3" fill="#5FE0A6"/>
    <rect x="364" y="68" width="42" height="16" rx="3" fill="#586590"/><circle cx="399" cy="76" r="3" fill="#FBC04A"/>
    <rect x="364" y="88" width="42" height="16" rx="3" fill="#586590"/><circle cx="399" cy="96" r="3" fill="#5FE0A6"/>
  </g>
  <!-- workstation grid 5 x 2 -->
  <g>
    <use href="#netPc" x="22"  y="128"/><use href="#netPc" x="100" y="128"/><use href="#netPc" x="178" y="128"/><use href="#netPc" x="256" y="128"/><use href="#netPc" x="334" y="128"/>
    <use href="#netPc" x="22"  y="188"/><use href="#netPc" x="100" y="188"/><use href="#netPc" x="178" y="188"/><use href="#netPc" x="256" y="188"/><use href="#netPc" x="334" y="188"/>
  </g>
</svg>
