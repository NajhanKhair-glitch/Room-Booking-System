<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 248" role="img" aria-label="Computer lab">
  <defs>
    <linearGradient id="clBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E9F1FC"/><stop offset="1" stop-color="#D8E6FA"/>
    </linearGradient>
    <g id="clPc">
      <rect x="2" y="2" width="48" height="32" rx="5" fill="#BFD6F2"/>
      <rect x="7" y="7" width="38" height="22" rx="3" fill="#5FC6E8"/>
      <rect x="11" y="11" width="20" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.85"/>
      <rect x="11" y="18" width="28" height="3" rx="1.5" fill="#FFFFFF" fill-opacity="0.6"/>
      <rect x="20" y="34" width="12" height="6" rx="2" fill="#7E93B5"/>
      <rect x="14" y="40" width="24" height="4" rx="2" fill="#9AAAC6"/>
    </g>
  </defs>
  <rect width="440" height="248" fill="url(#clBg)"/>
  <!-- whiteboard -->
  <rect x="120" y="26" width="200" height="42" rx="9" fill="#FFFFFF" stroke="#C6D5ED" stroke-width="2"/>
  <rect x="134" y="40" width="120" height="6" rx="3" fill="#DCE6F5"/>
  <rect x="134" y="52" width="150" height="5" rx="2.5" fill="#E8EEF8"/>
  <rect x="208" y="68" width="24" height="6" rx="3" fill="#A9BBD8"/>
  <!-- workstation grid 5 x 3 -->
  <g>
    <use href="#clPc" x="20"  y="92"/><use href="#clPc" x="98"  y="92"/><use href="#clPc" x="176" y="92"/><use href="#clPc" x="254" y="92"/><use href="#clPc" x="332" y="92"/>
    <use href="#clPc" x="20"  y="148"/><use href="#clPc" x="98"  y="148"/><use href="#clPc" x="176" y="148"/><use href="#clPc" x="254" y="148"/><use href="#clPc" x="332" y="148"/>
    <use href="#clPc" x="20"  y="204"/><use href="#clPc" x="98"  y="204"/><use href="#clPc" x="176" y="204"/><use href="#clPc" x="254" y="204"/><use href="#clPc" x="332" y="204"/>
  </g>
</svg>
